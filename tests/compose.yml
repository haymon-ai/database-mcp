services:
    mariadb_12:
        image: mariadb:12
        ports:
            - "3306"
        environment:
            MARIADB_ROOT_HOST: '%'
            MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
            MARIADB_DATABASE: mcp
        healthcheck:
            test: ["CMD", "mariadb", "-u", "root", "-e", "SELECT 1"]
            interval: 2s
            timeout: 5s
            retries: 15

    mysql_9:
        image: mysql:9
        ports:
            - "3306"
        environment:
            MYSQL_ROOT_HOST: '%'
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
            MYSQL_DATABASE: mcp
        healthcheck:
            test: ["CMD", "mysql", "-u", "root", "-e", "SELECT 1"]
            start_period: 15s
            interval: 2s
            timeout: 5s
            retries: 15

    postgres_18:
        image: postgres:18-alpine
        ports:
            - "5432"
        environment:
            POSTGRES_DB: mcp
            POSTGRES_USER: postgres
            POSTGRES_HOST_AUTH_METHOD: trust
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 2s
            timeout: 5s
            retries: 15
